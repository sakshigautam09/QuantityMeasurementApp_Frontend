<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Welcome back</h2>
    <p id="modalSubtitle">Sign in to save your history</p>

    <div class="modal-tabs">
      <button class="modal-tab active" id="loginTab" onclick="switchAuthTab('login')">Sign In</button>
      <button class="modal-tab" id="registerTab" onclick="switchAuthTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="modal-form">
        <div class="form-field">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="your_username" />
        </div>
        <div class="form-field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="modal-btn" onclick="doLogin()" id="loginBtn">Sign In</button>
      </div>
      <div class="divider-text" style="margin:14px 0">or</div>
      <button class="google-btn" onclick="triggerGoogleLogin()">
        <svg class="google-icon" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 33.6 29.2 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.2 3l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3.1 0 6 1.1 8.2 3l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 10-.2 13.6-3.4l-6.3-5.2C29.2 37 26.7 38 24 38c-5.1 0-9.5-3.4-11.2-8l-6.6 5C9.5 41.3 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.7l6.3 5.2C43 34.9 44 29.8 44 24c0-1.3-.1-2.7-.4-3.9z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none">
      <div class="modal-form">
        <div class="form-field">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="choose_username" />
        </div>
        <div class="form-field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" />
        </div>
        <div class="form-field">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="min 6 characters" />
        </div>
        <button class="modal-btn" onclick="doRegister()" id="registerBtn">Create Account</button>
      </div>
    </div>

    <!-- Hidden Google One Tap -->
    <div id="g_id_onload"
      data-client_id="621930458072-e1r85is40jvtcb3l1509se4m6f04ekb0.apps.googleusercontent.com"
      data-callback="handleGoogleCredential"
      data-auto_prompt="false">
    </div>
  </div>
</div>
