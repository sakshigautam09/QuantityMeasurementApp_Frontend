<aside class="sidebar" [class.open]="open">
  <div class="sidebar-backdrop" (click)="close()"></div>

  <div class="sidebar-inner">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">⚖️</div>
      <div class="logo-text">Quanti<span>Calc</span></div>
    </div>

    <!-- Dashboard Nav -->
    <div class="nav-section">
      <div class="nav-label">Dashboard</div>
      <a *ngFor="let item of dashboardNav"
         class="nav-item"
         [routerLink]="item.route"
         routerLinkActive="active"
         (click)="close()">
        <span class="nav-emoji">{{ item.emoji }}</span>
        <span>{{ item.label }}</span>
      </a>
    </div>

    <!-- Measurements Nav -->
    <div class="nav-section">
      <div class="nav-label">Measurements</div>
      <a *ngFor="let item of measureNav"
         class="nav-item"
         [routerLink]="item.route"
         routerLinkActive="active"
         (click)="close()">
        <span class="nav-emoji">{{ item.emoji }}</span>
        <span>{{ item.label }}</span>
      </a>
    </div>

    <div class="divider"></div>

    <!-- History -->
    <div class="nav-section">
      <a class="nav-item"
         routerLink="/history"
         routerLinkActive="active"
         (click)="close()">
        <span class="nav-emoji">📋</span>
        <span>History</span>
      </a>
    </div>

    <!-- User Panel -->
    <div class="user-panel">
      <ng-container *ngIf="auth.isLoggedIn(); else guestPanel">
        <div class="user-card">
          <div class="avatar">{{ auth.user()?.username?.slice(0,2)?.toUpperCase() }}</div>
          <div class="user-info">
            <div class="user-name">{{ auth.user()?.username }}</div>
            <div class="user-role">{{ auth.user()?.role || 'User' }}</div>
          </div>
          <button class="logout-btn" (click)="logout()" title="Sign out">↩</button>
        </div>
      </ng-container>

      <ng-template #guestPanel>
        <div class="signin-prompt" (click)="loginClick.emit()">
          <p>Sign in to save your history</p>
          <button class="signin-btn">🔑 Sign In / Register</button>
        </div>
      </ng-template>
    </div>
  </div>
</aside>
