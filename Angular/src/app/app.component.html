<div class="app-shell">

  <!-- Sidebar -->
  <app-sidebar
    [open]="sidebarOpen()"
    (openChange)="sidebarOpen.set($event)"
    (loginClick)="openAuthDialog()">
  </app-sidebar>

  <!-- Main content area -->
  <div class="main-area">

    <!-- Topbar header -->
    <app-header
      [pageTitle]="pageMeta().title"
      [pageTitleAccent]="pageMeta().accent"
      [apiOnline]="apiOnline()"
      (menuToggle)="toggleSidebar()">
    </app-header>

    <!-- Routed page content -->
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>

<!-- Global toast notifications -->
<app-toast></app-toast>
